name: Frontend CI

on:
  push:
    branches: [ master, develop ]
    paths:
      - 'frontend/**'
      - '.gitee/workflows/frontend-ci.yml'
  pull_request:
    branches: [ master, develop ]
    paths:
      - 'frontend/**'

jobs:
  build-and-test:
    name: 前端构建和测试
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v3
    
    - name: 📦 设置Node.js环境
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: 📚 安装依赖
      working-directory: ./frontend
      run: |
        npm install --registry=https://registry.npmmirror.com
    
    - name: 🔍 代码检查
      working-directory: ./frontend
      run: npm run lint
    
    - name: 🏗️ 构建项目
      working-directory: ./frontend
      run: npm run build
    
    - name: ✅ 构建成功
      run: |
        echo "前端构建成功！"
        echo "构建时间: $(date)"
