spring:
  application:
    name: nutriai-backend
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 210MB
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/nutriai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:root123}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
    open-in-view: false
  
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
    clean-disabled: false
  
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 2000
  
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  
  # 邮件服务配置（支持阿里云企业邮箱/腾讯企业邮箱/标准SMTP）
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    nickname: ${MAIL_NICKNAME:NutriAI饮食规划助手}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# JWT配置
jwt:
  secret: ${JWT_SECRET:nutriai-jwt-secret-key-2025-change-in-production-must-be-at-least-512-bits-long-for-hs512-algorithm}
  expiration: 86400000  # 24小时（毫秒）
  refresh-expiration: 604800000  # 7天（毫秒）

# AI大模型配置（OpenAI兼容协议，支持任意供应商）
ai:
  api-key: ${AI_API_KEY:}
  base-url: ${AI_BASE_URL:}
  model-name: ${AI_MODEL_NAME:qwen3.5-122b-a10b}
  diet-plan-model: ${AI_DIET_PLAN_MODEL:qwen3.5-flash}
  max-tokens: 2000
  temperature: 0.7
  top-p: 0.9
  timeout: 180  # 超时时间（秒）

# 腾讯云COS对象存储配置
tencent:
  cos:
    secret-id: ${COS_SECRET_ID:}
    secret-key: ${COS_SECRET_KEY:}
    region: ${COS_REGION:ap-beijing}
    bucket: ${COS_BUCKET:nutriai-assets}
    custom-domain: ${COS_CUSTOM_DOMAIN:}
  # 腾讯云即时通信IM配置
  im:
    sdk-app-id: ${SDKAppID:0}
    secret-key: ${SecretKey:}
    expire: 604800  # UserSig有效期7天（秒）

# 腾讯云短信配置（未配置时使用Mock模式，验证码仅输出到日志）
sms:
  tencent:
    secret-id: ${SMS_SECRET_ID:}
    secret-key: ${SMS_SECRET_KEY:}
    sdk-app-id: ${SMS_SDK_APP_ID:}
    sign-name: ${SMS_SIGN_NAME:NutriAI}
    template-id: ${SMS_TEMPLATE_ID:}

# 易支付（EPay）第三方聚合支付配置
epay:
  merchant-id: ${EPAY_MERCHANT_ID:}
  merchant-key: ${EPAY_MERCHANT_KEY:}
  api-url: ${EPAY_API_URL:}
  submit-url: ${EPAY_SUBMIT_URL:}
  mapi-url: ${EPAY_MAPI_URL:}
  notify-url: ${EPAY_NOTIFY_URL:http://localhost:8080/api/vip/epay/notify}
  return-url: ${EPAY_RETURN_URL:http://localhost:8080/api/vip/epay/return}
  default-type: alipay

# 日志配置
logging:
  level:
    root: INFO
    com.nutriai: DEBUG
    org.springframework.web: INFO
    org.springframework.web.socket: INFO
    org.springframework.messaging: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
  file:
    name: logs/nutriai-backend.log
    max-size: 10MB
    max-history: 30

# 系统配置
nutriai:
  # AI配额配置（未订阅营养卡用户的每日免费额度，VIP用户额度从套餐benefits中读取）
  ai-quota:
    free: 3         # 免费用户每日AI咨询次数
  
  # 会员成长值配置
  growth-points:
    login: 10           # 每日登录
    ai-chat: 5          # 完成AI咨询
    invite-register: 20 # 邀请好友注册
    invite-active: 30   # 邀请好友激活（完成首次AI咨询）
    upgrade-silver: 100 # 升级白银会员所需成长值
    upgrade-gold: 300   # 升级黄金会员所需成长值
  
  # 文件上传配置
  upload:
    max-size: 10485760  # 10MB
    allowed-types: jpg,jpeg,png,gif,pdf,txt
    local-path: ${UPLOAD_PATH:./uploads}
    base-url: http://localhost  # 文件访问基础URL

# 阿里云配置（已停用）
#aliyun:
#  access-key-id: ${ALIYUN_ACCESS_KEY_ID}
#  access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET}
#  imagerecog:
#    endpoint: imagerecog.cn-shanghai.aliyuncs.com
#    region: cn-shanghai

# 百度AI配置（保留用于其他功能）
baidu:
  ai:
    app-id: ${BAIDU_APP_ID:}
    api-key: ${BAIDU_API_KEY:}
    secret-key: ${BAIDU_SECRET_KEY:}

# 天聚数行API配置（食物营养识别）
tianapi:
  api-key: ${TIANAPI_API_KEY:}

# API限流配置
rate-limit:
  enabled: true
  default-rate: 100    # 默认限流：每秒100个请求
  api-rate: 50         # API限流：每秒50个请求
  ai-rate: 10          # AI接口限流：每秒10个请求
  login-rate: 5        # 登录接口限流：每分钟5个请求
  window-seconds: 60   # 限流时间窗口（秒）

# 微信小程序配置
wechat:
  miniapp:
    appid: ${WX_MINIAPP_APPID:}
    secret: ${WX_MINIAPP_SECRET:}

# 第三方社交登录配置
social:
  wechat:
    app-id: ${SOCIAL_WECHAT_APP_ID:}
    app-secret: ${SOCIAL_WECHAT_APP_SECRET:}
    redirect-uri: ${SOCIAL_WECHAT_REDIRECT_URI:https://nutriai.itshuo.me/auth/callback/wechat}
  qq:
    web-id: ${QQ_WEB_ID:}
    web-key: ${QQ_WEB_KEY:}
    app-id: ${QQ_APP_ID:}
    app-key: ${QQ_APP_KEY:}
    redirect-uri: ${SOCIAL_QQ_REDIRECT_URI:https://nutriai.itshuo.me/auth/callback/qq}
