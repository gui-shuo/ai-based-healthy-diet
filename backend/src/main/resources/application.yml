spring:
  application:
    name: nutriai-backend
  
  profiles:
    active: dev
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/nutriai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:root}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
    open-in-view: false
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
    clean-disabled: false
  
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 2000
  
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# JWT配置
jwt:
  secret: ${JWT_SECRET:nutriai-jwt-secret-key-2025-change-in-production-must-be-at-least-512-bits-long-for-hs512-algorithm}
  expiration: 86400000  # 24小时（毫秒）
  refresh-expiration: 604800000  # 7天（毫秒）

# 通义千问API配置
tongyi:
  api-key: ${TONGYI_API_KEY:}
  model: qwen-max
  max-tokens: 2000
  temperature: 0.7
  top-p: 0.9
  timeout: 180  # 超时时间（秒），默认180秒（3分钟）

# 阿里云OSS配置
aliyun:
  oss:
    endpoint: ${OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket-name: ${OSS_BUCKET:nutriai-assets}

# 日志配置
logging:
  level:
    root: INFO
    com.nutriai: DEBUG
    org.springframework.web: DEBUG
    org.springframework.web.socket: DEBUG
    org.springframework.messaging: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
  file:
    name: logs/nutriai-backend.log
    max-size: 10MB
    max-history: 30

# 系统配置
nutriai:
  # AI配额配置
  ai-quota:
    free: 3         # 普通会员每日AI咨询次数
    silver: 10      # 白银会员每日AI咨询次数
    gold: 20        # 黄金会员每日AI咨询次数
  
  # 会员成长值配置
  growth-points:
    login: 10           # 每日登录
    ai-chat: 5          # 完成AI咨询
    invite-register: 20 # 邀请好友注册
    invite-active: 30   # 邀请好友激活（完成首次AI咨询）
    upgrade-silver: 100 # 升级白银会员所需成长值
    upgrade-gold: 300   # 升级黄金会员所需成长值
  
  # 文件上传配置
  upload:
    max-size: 10485760  # 10MB
    allowed-types: jpg,jpeg,png,gif,pdf,txt
    local-path: d:/ProgrammingLanguage/Java/Projects/ai-based-healthy-diet/backend/uploads
    base-url: http://localhost  # 文件访问基础URL

# 阿里云配置（已停用）
#aliyun:
#  access-key-id: ${ALIYUN_ACCESS_KEY_ID}
#  access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET}
#  imagerecog:
#    endpoint: imagerecog.cn-shanghai.aliyuncs.com
#    region: cn-shanghai

# 百度AI配置
baidu:
  ai:
    app-id: ${BAIDU_APP_ID:}
    api-key: ${BAIDU_API_KEY:}
    secret-key: ${BAIDU_SECRET_KEY:}

# API限流配置
rate-limit:
  enabled: true
  default-rate: 100    # 默认限流：每秒100个请求
  api-rate: 50         # API限流：每秒50个请求
  ai-rate: 10          # AI接口限流：每秒10个请求
  login-rate: 5        # 登录接口限流：每分钟5个请求
  window-seconds: 60   # 限流时间窗口（秒）
