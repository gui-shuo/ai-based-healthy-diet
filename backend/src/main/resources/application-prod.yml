spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:nutriai}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 900000
      leak-detection-threshold: 60000
  
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    open-in-view: false
  
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
      password: ${REDIS_PASSWORD}
      timeout: 5000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 3000

# Tomcat 线程池与连接优化
server:
  tomcat:
    threads:
      max: 100
      min-spare: 10
    max-connections: 200
    accept-count: 50
    connection-timeout: 15000
    keep-alive-timeout: 30000
    max-keep-alive-requests: 100
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript

logging:
  level:
    root: WARN
    com.nutriai: INFO
    org.springframework.web.socket: WARN
    org.hibernate.SQL: WARN

# 生产环境CORS配置
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

# 微信小程序配置
wechat:
  miniapp:
    appid: ${WX_MINIAPP_APPID:wxcf557b14e389275f}
    secret: ${WX_MINIAPP_SECRET:}
