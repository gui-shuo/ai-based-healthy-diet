<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" opacity="0.1"/>
  
  <!-- 主图标 - 苹果形状 -->
  <path d="M100 30 C80 30, 70 40, 70 60 C70 90, 100 140, 100 140 C100 140, 130 90, 130 60 C130 40, 120 30, 100 30 Z" 
        fill="url(#grad1)"/>
  
  <!-- 叶子 -->
  <path d="M100 25 Q90 15, 95 10 Q100 5, 105 10 Q110 15, 100 25" 
        fill="#16a34a"/>
  
  <!-- AI芯片装饰 -->
  <rect x="85" y="65" width="30" height="3" fill="#ffffff" opacity="0.8" rx="1"/>
  <rect x="85" y="75" width="30" height="3" fill="#ffffff" opacity="0.8" rx="1"/>
  <rect x="85" y="85" width="30" height="3" fill="#ffffff" opacity="0.8" rx="1"/>
  
  <!-- 文字 -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="24" font-weight="bold" 
        text-anchor="middle" fill="#22c55e">NutriAI</text>
</svg>
