# 本地测试 - 使用 Docker Hub 镜像 + 腾讯云 MySQL
name: nutriai-local

services:
  redis:
    image: redis:6.0-alpine
    container_name: nutriai-redis
    restart: always
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}" --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - nutriai-network

  backend:
    image: heyitshuo/nutriai-backend:latest
    container_name: nutriai-backend
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AI_API_KEY: ${AI_API_KEY}
      AI_BASE_URL: ${AI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      AI_MODEL_NAME: ${AI_MODEL_NAME:-qwen-turbo}
      AI_DIET_PLAN_MODEL: ${AI_DIET_PLAN_MODEL:-doubao-seed-2.0-lite}
      COS_SECRET_ID: ${COS_SECRET_ID}
      COS_SECRET_KEY: ${COS_SECRET_KEY}
      COS_REGION: ${COS_REGION}
      COS_BUCKET: ${COS_BUCKET}
      COS_CUSTOM_DOMAIN: ${COS_CUSTOM_DOMAIN:-}
      BAIDU_AI_APP_ID: ${BAIDU_AI_APP_ID}
      BAIDU_AI_API_KEY: ${BAIDU_AI_API_KEY}
      BAIDU_AI_SECRET_KEY: ${BAIDU_AI_SECRET_KEY}
      TIANAPI_API_KEY: ${TIANAPI_API_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_NICKNAME: ${MAIL_NICKNAME:-NutriAI健康饮食助手}
      SMS_SECRET_ID: ${SMS_SECRET_ID:-}
      SMS_SECRET_KEY: ${SMS_SECRET_KEY:-}
      SMS_SDK_APP_ID: ${SMS_SDK_APP_ID:-}
      SMS_SIGN_NAME: ${SMS_SIGN_NAME:-NutriAI}
      SMS_TEMPLATE_ID: ${SMS_TEMPLATE_ID:-}
      EPAY_MERCHANT_ID: ${EPAY_MERCHANT_ID}
      EPAY_MERCHANT_KEY: ${EPAY_MERCHANT_KEY}
      EPAY_API_URL: ${EPAY_API_URL}
      EPAY_SUBMIT_URL: ${EPAY_SUBMIT_URL}
      EPAY_MAPI_URL: ${EPAY_MAPI_URL}
      EPAY_NOTIFY_URL: ${EPAY_NOTIFY_URL:-}
      EPAY_RETURN_URL: ${EPAY_RETURN_URL:-}
      WX_MINIAPP_APPID: ${WX_MINIAPP_APPID:-wxcf557b14e389275f}
      WX_MINIAPP_SECRET: ${WX_MINIAPP_SECRET:-}
      JAVA_OPTS: -Xms384m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication -XX:+OptimizeStringConcat -XX:MetaspaceSize=96m -XX:MaxMetaspaceSize=192m -Djava.security.egd=file:/dev/./urandom
    mem_limit: 768m
    memswap_limit: 768m
    volumes:
      - ./releases:/app/releases
    ports:
      - "8080:8080"
    networks:
      - nutriai-network

  frontend:
    image: heyitshuo/nutriai-frontend:latest
    container_name: nutriai-frontend
    restart: always
    depends_on:
      - backend
    mem_limit: 64m
    memswap_limit: 64m
    ports:
      - "3000:80"
    networks:
      - nutriai-network

networks:
  nutriai-network:
    driver: bridge

volumes:
  redis-data:
