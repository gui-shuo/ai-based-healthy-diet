name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: nutriai_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      
      redis:
        image: redis:6.0
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    
    steps:
    - name: 📥 Checkout代码
      uses: actions/checkout@v4
    
    - name: ☕ 设置JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: 📚 Maven缓存
      uses: actions/cache@v3
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-
    
    - name: 🔧 等待MySQL就绪
      run: |
        for i in {1..30}; do
          if mysqladmin ping -h"127.0.0.1" -P3306 -uroot -proot --silent; then
            echo "MySQL is ready!"
            break
          fi
          echo "Waiting for MySQL... ($i/30)"
          sleep 2
        done
    
    - name: 🗄️ 初始化数据库
      working-directory: ./database
      run: |
        mysql -h127.0.0.1 -P3306 -uroot -proot nutriai_test < V1__init_schema.sql || true
    
    - name: 🏗️ Maven构建
      working-directory: ./backend
      run: mvn clean package -DskipTests
    
    - name: 🧪 运行测试
      working-directory: ./backend
      run: mvn test
      env:
        SPRING_PROFILES_ACTIVE: test
        SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/nutriai_test
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: root
        SPRING_REDIS_HOST: localhost
        SPRING_REDIS_PORT: 6379
    
    - name: 📊 上传测试报告
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: backend-test-report
        path: backend/target/surefire-reports
        retention-days: 7
    
    - name: 📦 上传JAR包
      uses: actions/upload-artifact@v3
      with:
        name: backend-jar
        path: backend/target/*.jar
        retention-days: 7
    
    - name: 📈 生成构建报告
      if: always()
      run: |
        echo "## 构建报告 🎉" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- Java版本: 17" >> $GITHUB_STEP_SUMMARY
        echo "- 构建状态: ✅ 成功" >> $GITHUB_STEP_SUMMARY
        echo "- 构建时间: $(date)" >> $GITHUB_STEP_SUMMARY
