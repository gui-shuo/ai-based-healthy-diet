name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  frontend:
    name: 前端构建检查
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 📦 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📚 安装依赖
        working-directory: ./frontend
        run: npm install

      - name: 🔍 ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: 💅 Prettier
        working-directory: ./frontend
        run: npx prettier --check "src/**/*.{js,vue,css,scss}"

      - name: 🏗️ 构建
        working-directory: ./frontend
        run: npm run build

  backend:
    name: 后端构建检查
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: ☕ 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🏗️ Maven 编译
        working-directory: ./backend
        run: mvn clean compile -q

  security:
    name: 安全检查
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🔒 检查敏感信息
        run: |
          echo "扫描硬编码密码和 API Key..."
          FOUND=0
          if grep -rn "password\s*[:=]\s*['\"][^$']" --include="*.yml" --include="*.yaml" --include="*.properties" backend/src/main/resources/ 2>/dev/null | grep -v '\$\{'; then
            echo "::warning::发现可能的硬编码密码"
            FOUND=1
          fi
          if grep -rn "api[-_]key\s*[:=]\s*sk-" --include="*.yml" --include="*.yaml" backend/src/main/resources/ 2>/dev/null; then
            echo "::warning::发现可能的硬编码 API Key"
            FOUND=1
          fi
          if [ "$FOUND" -eq 0 ]; then
            echo "✅ 未发现硬编码敏感信息"
          fi
