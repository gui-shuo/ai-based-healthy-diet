name: Deploy to Production

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: 构建推送镜像并部署到云服务器
    runs-on: ubuntu-latest

    steps:
      # ==================== 1. 代码检出 ====================
      - name: 📥 Checkout代码
        uses: actions/checkout@v4

      # ==================== 2. 生成镜像标签 ====================
      - name: 🏷️ 生成镜像标签
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          fi

      # ==================== 3. 设置Docker Buildx ====================
      - name: 🔧 设置Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ==================== 4. 登录Docker Hub ====================
      - name: 🔐 登录Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ==================== 5. 构建并推送后端镜像 ====================
      - name: 🐳 构建并推送后端镜像
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/nutriai-backend:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_USERNAME }}/nutriai-backend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/nutriai-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/nutriai-backend:buildcache,mode=max

      # ==================== 6. 构建并推送前端镜像 ====================
      - name: 🐳 构建并推送前端镜像
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64
          build-args: |
            VITE_API_BASE_URL=${{ secrets.PROD_API_BASE_URL }}
            VITE_WS_BASE_URL=${{ secrets.PROD_WS_BASE_URL }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/nutriai-frontend:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_USERNAME }}/nutriai-frontend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/nutriai-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/nutriai-frontend:buildcache,mode=max

      # ==================== 7. 上传docker-compose到服务器 ====================
      - name: 📤 上传docker-compose到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/www/wwwroot/nutriai"
          overwrite: true

      # ==================== 8. SSH部署到服务器 ====================
      - name: 🚀 拉取镜像并启动容器
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: IMAGE_TAG,DOCKER_USERNAME,DOCKER_TOKEN
          script_stop: true
          command_timeout: 60m
          script: |
            set -e

            # ---- 0. 环境诊断 ----
            echo "当前用户: $(whoami)"
            echo "Shell: $(ps -p $$ -o comm= 2>/dev/null || echo unknown)"
            DOCKER_BIN=$(which docker 2>/dev/null || echo "")
            echo "Docker路径: ${DOCKER_BIN:-未找到}"

            # root 不需要 sudo，非 root 用 sudo
            if [ "$(whoami)" = "root" ]; then
              SUDO=""
            else
              SUDO="sudo"
            fi

            echo "============================================"
            echo "🚀 开始部署 NutriAI 项目"
            echo "部署时间: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "镜像标签: ${IMAGE_TAG}"
            echo "============================================"

            cd /www/wwwroot/nutriai

            if [ ! -f .env ]; then
              echo "❌ 错误：.env 文件不存在，请先手动创建 /www/wwwroot/nutriai/.env"
              exit 1
            fi

            $SUDO sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${IMAGE_TAG}|" .env
            $SUDO sed -i "s|^DOCKER_USERNAME=.*|DOCKER_USERNAME=${DOCKER_USERNAME}|" .env
            $SUDO chmod 600 .env
            echo "✅ .env 已更新"

            # ---- 1. 检测 docker compose 命令（POSIX 兼容写法）----
            COMPOSE_CMD=""
            if $SUDO docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="$SUDO docker compose"
              echo "✅ 使用 docker compose (v2 插件)"
            elif $SUDO docker-compose version >/dev/null 2>&1; then
              COMPOSE_CMD="$SUDO docker-compose"
              echo "✅ 使用 docker-compose (v1)"
            else
              echo "⚙️ 未找到可用的 docker compose，正在安装 docker-compose-plugin..."
              $SUDO apt-get update -y -qq && $SUDO apt-get install -y -qq docker-compose-plugin
              COMPOSE_CMD="$SUDO docker compose"
              echo "✅ docker-compose-plugin 安装完成"
            fi

            # ---- 2. 清理旧镜像 ----
            echo "🧹 清理本地旧镜像..."
            $SUDO docker rmi "${DOCKER_USERNAME}/nutriai-backend:latest" 2>/dev/null || true
            $SUDO docker rmi "${DOCKER_USERNAME}/nutriai-frontend:latest" 2>/dev/null || true
            echo "✅ 旧镜像已清理"

            # ---- 3. 拉取镜像（直接 docker pull，支持重试，POSIX 兼容）----
            echo "📥 拉取最新镜像..."

            do_pull() {
              IMG="$1"
              ATTEMPT=0
              while [ "$ATTEMPT" -lt 3 ]; do
                ATTEMPT=$((ATTEMPT + 1))
                echo "拉取 ${IMG}（第 ${ATTEMPT} 次）..."
                if $SUDO docker pull "$IMG"; then
                  echo "✅ ${IMG} 拉取成功"
                  return 0
                fi
                echo "⚠️ 第 ${ATTEMPT} 次失败，等待 10 秒后重试..."
                sleep 10
              done
              echo "❌ ${IMG} 拉取失败！请检查服务器网络或镜像加速配置"
              return 1
            }

            do_pull "${DOCKER_USERNAME}/nutriai-backend:latest"
            do_pull "${DOCKER_USERNAME}/nutriai-frontend:latest"

            # ---- 4. 启动容器 ----
            echo "▶️ 启动容器..."
            $COMPOSE_CMD -f docker-compose.prod.yml up -d --remove-orphans

            # ---- 5. 显示状态 ----
            echo ""
            echo "📊 容器运行状态："
            $COMPOSE_CMD -f docker-compose.prod.yml ps

            echo ""
            echo "============================================"
            echo "✅ 部署完成！"
            echo "============================================"

      # ==================== 9. 清理旧镜像 ====================
      - name: 🧹 清理服务器上的旧Docker镜像
        uses: appleboy/ssh-action@v1.0.3
        if: success()
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "🧹 清理旧镜像和未使用的资源..."
            if [ "$(whoami)" = "root" ]; then SUDO=""; else SUDO="sudo"; fi
            $SUDO docker image prune -f
            echo ""
            echo "💾 Docker磁盘使用情况："
            $SUDO docker system df
            echo "✅ 清理完成！"

      # ==================== 10. 部署结果摘要 ====================
      - name: 📈 部署结果摘要
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "## ✅ 部署成功" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ❌ 部署失败" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- 镜像标签: ${{ env.IMAGE_TAG }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 镜像仓库: docker.io/${{ secrets.DOCKER_USERNAME }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 服务器: ${{ secrets.SERVER_HOST }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 部署时间: $(date '+%Y-%m-%d %H:%M:%S')" >> "$GITHUB_STEP_SUMMARY"
