name: Deploy to Volcano Engine

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: 本地构建镜像并部署到云服务器
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout代码
        uses: actions/checkout@v4

      - name: 🏷️ 生成镜像标签
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: 🐳 构建后端镜像（GitHub Runner本地）
        run: docker build -t nutriai-backend:${{ env.IMAGE_TAG }} ./backend

      - name: 🐳 构建前端镜像（GitHub Runner本地）
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL="${{ secrets.PROD_API_BASE_URL }}" \
            --build-arg VITE_WS_BASE_URL="${{ secrets.PROD_WS_BASE_URL }}" \
            -t nutriai-frontend:${{ env.IMAGE_TAG }} \
            ./frontend

      - name: 📦 打包镜像与部署文件
        run: |
          mkdir -p deploy-package
          docker save nutriai-backend:${{ env.IMAGE_TAG }} nutriai-frontend:${{ env.IMAGE_TAG }} | gzip > deploy-package/nutriai-images.tar.gz
          cp docker-compose.prod.yml deploy-package/docker-compose.prod.yml
          cat > deploy-package/.env <<EOF
          IMAGE_TAG=${{ env.IMAGE_TAG }}
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          TONGYI_API_KEY=${{ secrets.TONGYI_API_KEY }}
          ALIYUN_OSS_ACCESS_KEY_ID=${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          ALIYUN_OSS_ACCESS_KEY_SECRET=${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          BAIDU_AI_APP_ID=${{ secrets.BAIDU_AI_APP_ID }}
          BAIDU_AI_API_KEY=${{ secrets.BAIDU_AI_API_KEY }}
          BAIDU_AI_SECRET_KEY=${{ secrets.BAIDU_AI_SECRET_KEY }}
          EOF

      - name: 📤 上传部署包到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy-package/nutriai-images.tar.gz,deploy-package/docker-compose.prod.yml,deploy-package/.env"
          target: "/tmp/nutriai-deploy"
          strip_components: 1

      - name: 🚀 在云服务器启动Docker服务
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            sudo mkdir -p /opt/nutriai
            sudo cp -f /tmp/nutriai-deploy/nutriai-images.tar.gz /opt/nutriai/
            sudo cp -f /tmp/nutriai-deploy/docker-compose.prod.yml /opt/nutriai/
            sudo cp -f /tmp/nutriai-deploy/.env /opt/nutriai/
            cd /opt/nutriai
            sudo docker load -i nutriai-images.tar.gz
            sudo docker compose --env-file .env -f docker-compose.prod.yml up -d
            sudo docker compose --env-file .env -f docker-compose.prod.yml ps

      - name: 📈 部署结果摘要
        run: |
          echo "## 🎉 Docker自动化部署完成" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- 镜像标签: ${{ env.IMAGE_TAG }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 部署方式: GitHub Runner本地构建 + 服务器docker load（避免云服务器构建）" >> "$GITHUB_STEP_SUMMARY"
          echo "- 服务器地址: ${{ secrets.SERVER_HOST }}" >> "$GITHUB_STEP_SUMMARY"
