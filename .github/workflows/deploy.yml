name: Deploy to Production

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: 构建推送镜像并部署到云服务器
    runs-on: ubuntu-latest

    steps:
      # ==================== 1. 代码检出 ====================
      - name: 📥 Checkout代码
        uses: actions/checkout@v5

      # ==================== 2. 生成镜像标签 ====================
      - name: 🏷️ 生成镜像标签
        run: |
          echo "==> 当前构建信息:"
          echo "    Commit SHA: ${GITHUB_SHA}"
          echo "    Ref: ${GITHUB_REF}"
          echo "    最新提交: $(git log --oneline -1)"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          fi

      # ==================== 3. 设置Docker Buildx ====================
      - name: 🔧 设置Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ==================== 4. 登录腾讯云 CCR ====================
      - name: 🔐 登录腾讯云容器镜像服务
        uses: docker/login-action@v4
        with:
          registry: hkccr.ccs.tencentyun.com
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      # ==================== 5. 构建并推送后端镜像 ====================
      - name: 🐳 构建并推送后端镜像
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64
          no-cache: true
          tags: |
            hkccr.ccs.tencentyun.com/${{ secrets.TCR_NAMESPACE }}/nutriai-backend:${{ env.IMAGE_TAG }}
            hkccr.ccs.tencentyun.com/${{ secrets.TCR_NAMESPACE }}/nutriai-backend:latest

      # ==================== 6. 构建并推送前端镜像 ====================
      - name: 🐳 构建并推送前端镜像
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64
          no-cache: true
          tags: |
            hkccr.ccs.tencentyun.com/${{ secrets.TCR_NAMESPACE }}/nutriai-frontend:${{ env.IMAGE_TAG }}
            hkccr.ccs.tencentyun.com/${{ secrets.TCR_NAMESPACE }}/nutriai-frontend:latest

      # ==================== 7. 上传docker-compose到服务器 ====================
      - name: 📤 上传docker-compose到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/www/wwwroot/nutriai"
          overwrite: true

      # ==================== 8. SSH部署到服务器 ====================
      - name: 🚀 拉取镜像并启动容器
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          TCR_USERNAME: ${{ secrets.TCR_USERNAME }}
          TCR_PASSWORD: ${{ secrets.TCR_PASSWORD }}
          TCR_NAMESPACE: ${{ secrets.TCR_NAMESPACE }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: IMAGE_TAG,TCR_USERNAME,TCR_PASSWORD,TCR_NAMESPACE
          script_stop: false
          command_timeout: 60m
          script: |
            echo "============================================"
            echo "开始部署 NutriAI 项目"
            echo "部署时间: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "镜像标签: ${IMAGE_TAG}"
            echo "============================================"

            cd /www/wwwroot/nutriai

            if [ ! -f .env ]; then
              echo "ERROR: .env 文件不存在" && exit 1
            fi

            sed -i "s|^TCR_NAMESPACE=.*|TCR_NAMESPACE=${TCR_NAMESPACE}|" .env
            chmod 600 .env
            echo "==> .env 已更新"

            # 登录腾讯云 CCR
            echo "==> 登录腾讯云 CCR..."
            echo "${TCR_PASSWORD}" | docker login hkccr.ccs.tencentyun.com -u "${TCR_USERNAME}" --password-stdin
            if [ $? -ne 0 ]; then
              echo "ERROR: 登录 CCR 失败" && exit 1
            fi

            # 停止正在运行的旧容器
            echo "==> 停止旧容器..."
            COMPOSE_CMD=""
            docker compose version >/dev/null 2>&1 && COMPOSE_CMD="docker compose"
            if [ -z "$COMPOSE_CMD" ]; then
              docker-compose version >/dev/null 2>&1 && COMPOSE_CMD="docker-compose"
            fi
            if [ -z "$COMPOSE_CMD" ]; then
              echo "==> 安装 docker-compose-plugin..."
              apt-get update -y -qq && apt-get install -y -qq docker-compose-plugin
              COMPOSE_CMD="docker compose"
            fi
            echo "==> 使用: $COMPOSE_CMD"

            $COMPOSE_CMD -f docker-compose.prod.yml down --remove-orphans 2>/dev/null || true

            # 停止并移除可能存在的独立 Redis 容器（非 compose 管理的）
            echo "==> 清理独立运行的 Redis 容器..."
            docker stop nutriai-redis 2>/dev/null || true
            docker rm nutriai-redis 2>/dev/null || true

            # 清理旧镜像
            echo "==> 清理旧镜像..."
            docker rmi "hkccr.ccs.tencentyun.com/${TCR_NAMESPACE}/nutriai-backend:latest" 2>/dev/null || true
            docker rmi "hkccr.ccs.tencentyun.com/${TCR_NAMESPACE}/nutriai-frontend:latest" 2>/dev/null || true

            # 拉取后端镜像（重试3次）
            echo "==> 拉取后端镜像..."
            BACKEND_IMG="hkccr.ccs.tencentyun.com/${TCR_NAMESPACE}/nutriai-backend:latest"
            PULL_OK=false
            ATTEMPT=0
            while [ "$ATTEMPT" -lt 3 ]; do
              ATTEMPT=$((ATTEMPT + 1))
              echo "    第 ${ATTEMPT} 次尝试..."
              docker pull "$BACKEND_IMG" && PULL_OK=true && break
              echo "    失败，等待10秒..." && sleep 10
            done
            if [ "$PULL_OK" != "true" ]; then
              echo "ERROR: 后端镜像拉取失败" && exit 1
            fi

            # 拉取前端镜像（重试3次）
            echo "==> 拉取前端镜像..."
            FRONTEND_IMG="hkccr.ccs.tencentyun.com/${TCR_NAMESPACE}/nutriai-frontend:latest"
            PULL_OK=false
            ATTEMPT=0
            while [ "$ATTEMPT" -lt 3 ]; do
              ATTEMPT=$((ATTEMPT + 1))
              echo "    第 ${ATTEMPT} 次尝试..."
              docker pull "$FRONTEND_IMG" && PULL_OK=true && break
              echo "    失败，等待10秒..." && sleep 10
            done
            if [ "$PULL_OK" != "true" ]; then
              echo "ERROR: 前端镜像拉取失败" && exit 1
            fi

            echo "==> 镜像拉取完成"

            # 用新镜像启动所有容器（包括 compose 管理的 Redis）
            echo "==> 启动容器..."
            $COMPOSE_CMD -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
            if [ $? -ne 0 ]; then
              echo "ERROR: 容器启动失败" && exit 1
            fi

            echo ""
            echo "==> 容器状态:"
            $COMPOSE_CMD -f docker-compose.prod.yml ps

            docker logout hkccr.ccs.tencentyun.com 2>/dev/null || true

            echo ""
            echo "============================================"
            echo "部署完成！前端: 3000, 后端: 8080"
            echo "============================================"

      # ==================== 9. 清理旧镜像 ====================
      - name: 🧹 清理服务器上的旧Docker镜像
        uses: appleboy/ssh-action@v1.0.3
        if: success()
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker image prune -f
            echo "Docker磁盘使用:"
            docker system df
            echo "清理完成"

      # ==================== 10. 部署结果摘要 ====================
      - name: 📈 部署结果摘要
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "## ✅ 部署成功" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ❌ 部署失败" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- 镜像标签: ${{ env.IMAGE_TAG }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 镜像仓库: hkccr.ccs.tencentyun.com/${{ secrets.TCR_NAMESPACE }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 服务器: ${{ secrets.SERVER_HOST }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 部署时间: $(date '+%Y-%m-%d %H:%M:%S')" >> "$GITHUB_STEP_SUMMARY"
