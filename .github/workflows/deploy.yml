name: Deploy to Production

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

jobs:
  deploy-frontend:
    name: 部署前端
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: 📥 Checkout代码
      uses: actions/checkout@v4
    
    - name: 📦 设置Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: 📚 安装依赖
      working-directory: ./frontend
      run: npm ci
    
    - name: 🏗️ 生产构建
      working-directory: ./frontend
      run: npm run build
      env:
        VITE_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
        VITE_WS_BASE_URL: ${{ secrets.PROD_WS_BASE_URL }}
    
    - name: 📦 打包部署文件
      working-directory: ./frontend
      run: |
        tar -czf frontend-dist.tar.gz dist/
    
    - name: 📤 上传到服务器
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        source: "frontend/frontend-dist.tar.gz"
        target: "/tmp/"
    
    - name: 🚀 部署到Nginx
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /tmp/frontend
          tar -xzf frontend-dist.tar.gz
          rm -rf /var/www/nutriai/*
          mv dist/* /var/www/nutriai/
          nginx -s reload
          echo "前端部署完成！"
    
    - name: 📈 部署成功通知
      run: |
        echo "## 🎉 前端部署成功！" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- 版本: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- 时间: $(date)" >> $GITHUB_STEP_SUMMARY
        echo "- 访问地址: https://nutriai.com" >> $GITHUB_STEP_SUMMARY
  
  deploy-backend:
    name: 部署后端
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: 📥 Checkout代码
      uses: actions/checkout@v4
    
    - name: ☕ 设置JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: 🏗️ Maven打包
      working-directory: ./backend
      run: mvn clean package -DskipTests -Pprod
    
    - name: 🐳 构建Docker镜像
      working-directory: ./backend
      run: |
        docker build -t nutriai-backend:${{ github.ref_name }} .
        docker tag nutriai-backend:${{ github.ref_name }} nutriai-backend:latest
    
    - name: 📤 推送Docker镜像
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
        docker push nutriai-backend:${{ github.ref_name }}
        docker push nutriai-backend:latest
    
    - name: 🚀 部署到服务器
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /opt/nutriai
          docker-compose pull backend
          docker-compose up -d backend
          docker-compose ps
          echo "后端部署完成！"
    
    - name: 📈 部署成功通知
      run: |
        echo "## 🎉 后端部署成功！" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- 版本: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- 时间: $(date)" >> $GITHUB_STEP_SUMMARY
        echo "- API地址: https://api.nutriai.com" >> $GITHUB_STEP_SUMMARY
