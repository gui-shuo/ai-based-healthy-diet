name: Deploy to Production

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  deploy:
    name: 构建推送镜像并部署到云服务器
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout代码
        uses: actions/checkout@v4

      - name: 🏷️ 生成镜像标签
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          fi

      - name: 🔐 登录Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: 🐳 构建并推送后端镜像
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/nutriai-backend:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_USERNAME }}/nutriai-backend:latest

      - name: 🐳 构建并推送前端镜像
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ secrets.PROD_API_BASE_URL }}
            VITE_WS_BASE_URL=${{ secrets.PROD_WS_BASE_URL }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/nutriai-frontend:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_USERNAME }}/nutriai-frontend:latest

      - name: 📤 上传docker-compose到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/www/wwwroot/nutriai"
          overwrite: true

      - name: 🚀 拉取镜像并启动容器
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: IMAGE_TAG,DOCKER_USERNAME,DOCKER_TOKEN
          command_timeout: 100s
          script: |
            set -e
            cd /www/wwwroot/nutriai
            if [ ! -f .env ]; then
              echo "ERROR: /www/wwwroot/nutriai/.env 不存在，请先手动创建" && exit 1
            fi
            sudo sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${IMAGE_TAG}|" .env
            sudo sed -i "s|^DOCKER_USERNAME=.*|DOCKER_USERNAME=${DOCKER_USERNAME}|" .env
            sudo chmod 600 .env
            echo "${DOCKER_TOKEN}" | sudo docker login -u "${DOCKER_USERNAME}" --password-stdin
            sudo docker compose --env-file .env -f docker-compose.prod.yml pull
            sudo docker compose --env-file .env -f docker-compose.prod.yml up -d --remove-orphans
            sudo docker compose --env-file .env -f docker-compose.prod.yml ps
            sudo docker logout
            echo "✅ 部署完成"

      - name: 📈 部署结果摘要
        run: |
          echo "## 🎉 部署完成" >> "$GITHUB_STEP_SUMMARY"
          echo "- 镜像标签: ${{ env.IMAGE_TAG }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 镜像仓库: docker.io/${{ secrets.DOCKER_USERNAME }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 服务器: ${{ secrets.SERVER_HOST }}" >> "$GITHUB_STEP_SUMMARY"
          echo "## 🎉 部署完成" >> "$GITHUB_STEP_SUMMARY"
          echo "- 镜像标签: ${{ env.IMAGE_TAG }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 镜像仓库: docker.io/${{ secrets.DOCKER_USERNAME }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 服务器: ${{ secrets.SERVER_HOST }}" >> "$GITHUB_STEP_SUMMARY"
