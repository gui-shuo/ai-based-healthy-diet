name: Deploy to Volcano Engine

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  deploy:
    name: 本地构建镜像并部署到云服务器
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout代码
        uses: actions/checkout@v4

      - name: 🏷️ 生成镜像标签
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          fi

      - name: 🐳 构建后端镜像（GitHub Runner本地）
        run: docker build -t nutriai-backend:${{ env.IMAGE_TAG }} ./backend

      - name: 🐳 构建前端镜像（GitHub Runner本地）
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL="${{ secrets.PROD_API_BASE_URL }}" \
            --build-arg VITE_WS_BASE_URL="${{ secrets.PROD_WS_BASE_URL }}" \
            -t nutriai-frontend:${{ env.IMAGE_TAG }} \
            ./frontend

      - name: 📦 打包镜像与部署文件
        run: |
          set -eo pipefail
          mkdir -p deploy-package
          docker save nutriai-backend:${{ env.IMAGE_TAG }} nutriai-frontend:${{ env.IMAGE_TAG }} | gzip > deploy-package/nutriai-images.tar.gz
          cp docker-compose.prod.yml deploy-package/docker-compose.prod.yml
          echo "✅ 打包完成："
          ls -lh deploy-package/

      - name: 🔑 配置SSH密钥
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: 📤 上传部署包到服务器
        run: |
          set -e
          SSH_OPTS="-i ~/.ssh/deploy_key"
          REMOTE="${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}"
          ssh $SSH_OPTS "$REMOTE" "mkdir -p /tmp/nutriai-deploy && chmod 700 /tmp/nutriai-deploy"
          scp $SSH_OPTS \
            deploy-package/nutriai-images.tar.gz \
            deploy-package/docker-compose.prod.yml \
            "$REMOTE":/tmp/nutriai-deploy/
          echo "✅ 上传完成"

      - name: 🚀 在云服务器启动Docker服务
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            sudo mkdir -p /www/wwwroot/nutriai
            sudo cp -f /tmp/nutriai-deploy/nutriai-images.tar.gz /www/wwwroot/nutriai/
            sudo cp -f /tmp/nutriai-deploy/docker-compose.prod.yml /www/wwwroot/nutriai/
            cd /www/wwwroot/nutriai
            # 更新 .env 中的镜像标签（.env 由管理员手动维护，此处仅更新 IMAGE_TAG）
            if [ ! -f .env ]; then
              echo "ERROR: /www/wwwroot/nutriai/.env 不存在，请先手动创建（参考 .env.example）" && exit 1
            fi
            sudo sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ env.IMAGE_TAG }}/" .env
            sudo chmod 600 .env
            sudo docker load -i nutriai-images.tar.gz
            sudo docker compose --env-file .env -f docker-compose.prod.yml up -d
            sudo docker compose --env-file .env -f docker-compose.prod.yml ps
            sudo rm -rf /tmp/nutriai-deploy

      - name: 🧹 清理SSH密钥
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: 📈 部署结果摘要
        run: |
          echo "## 🎉 Docker自动化部署完成" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- 镜像标签: ${{ env.IMAGE_TAG }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 部署方式: GitHub Runner本地构建 + 服务器docker load（避免云服务器构建）" >> "$GITHUB_STEP_SUMMARY"
          echo "- 服务器地址: ${{ secrets.SERVER_HOST }}" >> "$GITHUB_STEP_SUMMARY"
