version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: nutriai-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: nutriai
      MYSQL_USER: nutriai_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nutriai123}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./backend/src/main/resources/db/migration/alldata.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - nutriai-network
  
  # Redis缓存
  redis:
    image: redis:6.0-alpine
    container_name: nutriai-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    networks:
      - nutriai-network
  
  # 后端服务
  backend:
    build: ./backend
    container_name: nutriai-backend
    restart: always
    depends_on:
      - mysql
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/nutriai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
      SPRING_DATASOURCE_USERNAME: nutriai_user
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-nutriai123}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      JWT_SECRET: ${JWT_SECRET}
      TONGYI_API_KEY: ${TONGYI_API_KEY}
      COS_SECRET_ID: ${COS_SECRET_ID}
      COS_SECRET_KEY: ${COS_SECRET_KEY}
      COS_REGION: ${COS_REGION}
      COS_BUCKET: ${COS_BUCKET}
    ports:
      - "8080:8080"
    volumes:
      - ./logs/backend:/app/logs
    networks:
      - nutriai-network
  
  # Nginx前端服务
  nginx:
    image: nginx:1.25-alpine
    container_name: nutriai-nginx
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - nutriai-network

networks:
  nutriai-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
