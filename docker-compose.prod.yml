services:
  redis:
    image: redis:6.0-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - nutriai-network

  backend:
    image: hkccr.ccs.tencentyun.com/${TCR_NAMESPACE}/nutriai-backend:latest
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      TONGYI_API_KEY: ${TONGYI_API_KEY}
      COS_SECRET_ID: ${COS_SECRET_ID}
      COS_SECRET_KEY: ${COS_SECRET_KEY}
      COS_REGION: ${COS_REGION}
      COS_BUCKET: ${COS_BUCKET}
      BAIDU_AI_APP_ID: ${BAIDU_AI_APP_ID}
      BAIDU_AI_API_KEY: ${BAIDU_AI_API_KEY}
      BAIDU_AI_SECRET_KEY: ${BAIDU_AI_SECRET_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      # 邮件服务配置（使用已有SMTP服务，如QQ邮箱/163/阿里云企业邮箱）
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_NICKNAME: ${MAIL_NICKNAME:-NutriAI健康饮食助手}
      # 腾讯云短信配置（登录腾讯云短信控制台获取）
      SMS_SECRET_ID: ${SMS_SECRET_ID}
      SMS_SECRET_KEY: ${SMS_SECRET_KEY}
      SMS_SDK_APP_ID: ${SMS_SDK_APP_ID}
      SMS_SIGN_NAME: ${SMS_SIGN_NAME:-NutriAI}
      SMS_TEMPLATE_ID: ${SMS_TEMPLATE_ID}
      # 不再运行本地MySQL，可以给后端更多内存
      JAVA_OPTS: -Xms384m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    ports:
      - "8080:8080"
    networks:
      - nutriai-network

  frontend:
    image: hkccr.ccs.tencentyun.com/${TCR_NAMESPACE}/nutriai-frontend:latest
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - nutriai-network

networks:
  nutriai-network:
    driver: bridge

volumes:
  redis-data:
