# 显式指定项目名称，确保所有容器都在 nutriai 项目下
# 避免与 Inspo-Verse 等其他项目的容器互相干扰
name: nutriai

services:
  redis:
    image: redis:6.0-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}" --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    mem_limit: 128m
    memswap_limit: 128m
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - nutriai-network

  backend:
    image: hkccr.ccs.tencentyun.com/${TCR_NAMESPACE}/nutriai-backend:latest
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AI_API_KEY: ${AI_API_KEY}
      AI_BASE_URL: ${AI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      AI_MODEL_NAME: ${AI_MODEL_NAME:-qwen-turbo}
      COS_SECRET_ID: ${COS_SECRET_ID}
      COS_SECRET_KEY: ${COS_SECRET_KEY}
      COS_REGION: ${COS_REGION}
      COS_BUCKET: ${COS_BUCKET}
      BAIDU_AI_APP_ID: ${BAIDU_AI_APP_ID}
      BAIDU_AI_API_KEY: ${BAIDU_AI_API_KEY}
      BAIDU_AI_SECRET_KEY: ${BAIDU_AI_SECRET_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      # 邮件服务配置（使用已有SMTP服务，如QQ邮箱/163/阿里云企业邮箱）
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_NICKNAME: ${MAIL_NICKNAME:-NutriAI健康饮食助手}
      # 腾讯云短信配置（登录腾讯云短信控制台获取）
      SMS_SECRET_ID: ${SMS_SECRET_ID}
      SMS_SECRET_KEY: ${SMS_SECRET_KEY}
      SMS_SDK_APP_ID: ${SMS_SDK_APP_ID}
      SMS_SIGN_NAME: ${SMS_SIGN_NAME:-NutriAI}
      SMS_TEMPLATE_ID: ${SMS_TEMPLATE_ID}
      # 码支付（EPay）聚合支付配置
      EPAY_MERCHANT_ID: ${EPAY_MERCHANT_ID}
      EPAY_MERCHANT_KEY: ${EPAY_MERCHANT_KEY}
      EPAY_API_URL: ${EPAY_API_URL}
      EPAY_SUBMIT_URL: ${EPAY_SUBMIT_URL}
      EPAY_MAPI_URL: ${EPAY_MAPI_URL}
      EPAY_NOTIFY_URL: ${EPAY_NOTIFY_URL}
      EPAY_RETURN_URL: ${EPAY_RETURN_URL}
      # 不再运行本地MySQL，可以给后端更多内存
      JAVA_OPTS: -Xms256m -Xmx384m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    mem_limit: 512m
    memswap_limit: 512m
    ports:
      - "8080:8080"
    networks:
      - nutriai-network

  frontend:
    image: hkccr.ccs.tencentyun.com/${TCR_NAMESPACE}/nutriai-frontend:latest
    restart: always
    depends_on:
      - backend
    mem_limit: 64m
    memswap_limit: 64m
    ports:
      - "3000:80"
    networks:
      - nutriai-network

networks:
  nutriai-network:
    driver: bridge

volumes:
  redis-data:
